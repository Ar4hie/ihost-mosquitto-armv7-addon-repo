---
version: 8.1.1-patched1
slug: matter_server_proxy_patched
name: Matter Server proxy patched
description: Matter WebSocket Server for Home Assistant Matter support, patched for iHost/armv7 with optional HTTP/HTTPS proxy for DCL access.
url: >-
  https://github.com/Ar4hie/ihost-mosquitto-armv7-addon-repo/tree/main/hassio-ihost-matter-server-proxy-patched
arch:
  - armv7
discovery:
  - matter
hassio_api: true
homeassistant: 2024.6.0
# IPC is only used within the Add-on
host_ipc: false
host_network: true
host_dbus: true
ingress: true
ingress_port: 5580
init: false
map:
  - type: addon_config
    read_only: false
options:
  log_level: info
  log_level_sdk: error
  beta: false
  enable_test_net_dcl: false
  proxy:
    enabled: true
    url: "http://192.168.10.14:10810"
    no_proxy: "localhost,127.0.0.1,supervisor,homeassistant,core-matter-server,core_matter_server,172.30.0.0/16,192.168.0.0/16,192.168.10.0/24"
schema:
  log_level: list(verbose|debug|info|warning|error|critical)
  log_level_sdk: list(automation|detail|progress|error|none)?
  beta: bool?
  enable_test_net_dcl: bool?
  bluetooth_adapter_id: int?
  matter_server_args:
    - str?
  matter_server_version: str?
  matter_sdk_wheels_version: str?
  proxy:
    enabled: bool
    url: str?
    no_proxy: str?
ports:
  5580/tcp: 5580
stage: stable
startup: services

# No image key on purpose: Supervisor will build this wrapper locally from Dockerfile.
# Based on iHost armv7 Matter Server 8.1.1. The wrapper exports proxy variables
# before starting the original /init entrypoint, so Matter Server can fetch DCL data.
