name: "Matter Bridge for iHost patched MQTT"
version: "1.2.0-patched1"
slug: "ihost_matter_bridge_patched_mqtt"
description: "Patched Matter Bridge add-on for iHost: skips core_mosquitto service dependency and uses configured MQTT broker."
url: "https://github.com/Ar4hie/ihost-mosquitto-armv7-addon-repo/tree/main/hassio-ihost-matter-bridge-addon-patched"

startup: application
boot: auto

arch:
  - armv7

init: false

panel_icon: "mdi:alpha-m-circle"
panel_title: "Matter Bridge patched"

ingress: true
ingress_port: 3030
ingress_stream: true

host_network: true
homeassistant_api: true
hassio_role: admin
hassio_api: true

privileged:
  - SYS_ADMIN
  - SYS_MODULE
  - SYS_NICE
  - SYS_PTRACE
  - SYS_RAWIO
  - SYS_RESOURCE
  - SYS_TIME

map:
  - type: addon_config
    read_only: false
    path: "/matter-bridge-data"
  - type: homeassistant_config
    read_only: false
    path: "/config"

options:
  log_level: "Info"
  mqtt:
    server: "mqtt://2c914bdd-mosquitto:1883"
    username: "mqtt_user"
    password: "mqtt123456"

schema:
  log_level: "list(None|Info|Debug)?"
  mqtt:
    server: "str?"
    username: "str?"
    password: "str?"

devices:
  - /dev/teepriv0
  - /dev/tee0
  - /dev/vendor_storage

# No image key on purpose: Supervisor will build this wrapper locally from Dockerfile.
# Original add-on used services: ["mqtt:need"], removed here for armv7/iHost compatibility.
