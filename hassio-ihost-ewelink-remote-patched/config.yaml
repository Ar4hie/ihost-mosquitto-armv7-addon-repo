name: "eWeLink-Remote Gateway patched MQTT"
version: "0.3.1-patched1"
slug: "ewelink_remote_patched_mqtt"
description: "Patched eWeLink-Remote Gateway add-on for iHost: skips core_mosquitto service dependency and uses configured MQTT broker."
url: "https://github.com/Ar4hie/ihost-mosquitto-armv7-addon-repo/tree/main/hassio-ihost-ewelink-remote-patched"

startup: application
boot: auto

arch:
  - armv7

init: false

panel_icon: "mdi:signal-variant"
panel_title: "eWeLink Remote patched"

ingress: true
ingress_port: 3031
ingress_stream: true

host_network: true
homeassistant_api: true
hassio_role: admin
hassio_api: true
host_dbus: true

map:
  - type: homeassistant_config
    read_only: false
    path: "/config"
  - type: addon_config
    read_only: false
    path: "/server_data"

options:
  log_level: "Info"
  mqtt:
    server: "mqtt://2c914bdd-mosquitto:1883"
    username: "mqtt_user"
    password: "mqtt123456"

schema:
  log_level: "list(None|Info|Debug)?"
  mqtt:
    server: "str?"
    username: "str?"
    password: "str?"

homeassistant: "2025.9.2"

# No image key on purpose: Supervisor will build this wrapper locally from Dockerfile.
# Original add-on used services: ["mqtt:need"], removed here for armv7/iHost compatibility.
