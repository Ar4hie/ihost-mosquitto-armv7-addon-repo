name: "iHost Hardware Control patched MQTT"
version: "1.1.3-patched1"
slug: "ihost_hardware_control_patched_mqtt"
description: "Patched iHost Hardware Control add-on for iHost: skips core_mosquitto install/start checks and uses configured MQTT broker."
url: "https://github.com/Ar4hie/ihost-mosquitto-armv7-addon-repo"

startup: application
boot: auto

arch:
  - armv7

init: false
uart: true
udev: true

hassio_role: manager
hassio_api: true
homeassistant_api: true

map:
  - type: addon_config
    read_only: false
    path: "/ihost-hardware-control"
  - type: homeassistant_config
    read_only: false
    path: "/config"

options:
  data_path: "/config/iHost-Hardware-Control"
  mqtt:
    server: "mqtt://2c914bdd-mosquitto:1883"
    username: "mqtt_user"
    password: ""

schema:
  data_path: str
  mqtt:
    server: str?
    username: str?
    password: str?

devices:
  - "/dev/ttyS3"

# No image key on purpose: Supervisor will build this wrapper locally from Dockerfile.
