name: File editor armv7
version: 5.8.0
slug: file_editor_armv7
description: Simple browser-based file editor for Home Assistant, pinned to last armv7-compatible release for Sonoff iHost
url: https://github.com/Ar4hie/ihost-mosquitto-armv7-addon-repo/tree/main/file-editor-armv7

arch:
  - armv7

homeassistant: 0.91.1
homeassistant_api: true

ingress: true
init: false

map:
  - all_addon_configs:rw
  - backup:rw
  - homeassistant_config:rw
  - media:rw
  - share:rw
  - ssl:rw

options:
  dirsfirst: false
  enforce_basepath: true
  git: true
  ignore_pattern:
    - __pycache__
    - .cloud
    - .storage
    - deps
  ssh_keys: []

panel_icon: mdi:wrench

schema:
  dirsfirst: bool
  enforce_basepath: bool
  git: bool
  ignore_pattern:
    - str
  ssh_keys:
    - str
