name: "eWeLink Smart Home patched MQTT"
version: "1.1.0-patched2"
slug: "ewelink_smart_home_patched_mqtt"
description: "Patched eWeLink Smart Home add-on for iHost: skips core_mosquitto install and uses configured MQTT broker."
url: "https://github.com/Ar4hie/ihost-mosquitto-armv7-addon-repo"

startup: application
boot: manual

arch:
  - armv7

init: false

panel_icon: "mdi:atom-variant"
panel_title: "eWeLink patched"

ingress: true
ingress_port: 8325
ingress_stream: true

host_network: true
homeassistant_api: true
hassio_role: admin
hassio_api: true

map:
  - type: addon_config
    read_only: false
    path: "/Sonoff-Smart-Home-Addon"

options:
  data_path: "/Sonoff-Smart-Home-Addon"
  mqtt:
    server: "mqtt://127.0.0.1:1883"
    username: "mqtt_user"
    password: ""

schema:
  data_path: str
  mqtt:
    server: str?
    username: str?
    password: str?

# No image key on purpose: Supervisor will build this wrapper locally from Dockerfile.
